<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Control</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/control.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="page-header">
        <h1>Smart Control</h1>
        <p>Kontrol aktuator kolam</p>
    </div>

<!-- MODE -->

<div class="mode-card">

    <h3>Mode Aktuator</h3>

    <div class="mode-switch">

        <button id="autoBtn" class="mode-btn active">
            AUTO
        </button>

        <button id="manualBtn" class="mode-btn">
            MANUAL
        </button>

    </div>

</div>

    <!-- WATER PUMP -->
    <div class="control-card">

        <div>
            <h3>Water Pump</h3>
            <p id="pumpStatus">
                Monitoring DO
            </p>
        </div>

        <label class="switch">
            <input id="pumpSwitch" type="checkbox" disabled>
            <span class="slider"></span>
        </label>

    </div>

    <!-- AUTO ROOF -->
    <div class="control-card">

        <div>
            <h3>Auto Roof</h3>
            <p id="roofStatus">
                Monitoring suhu
            </p>
        </div>

        <label class="switch">
        <input id="roofSwitch" type="checkbox" disabled>
            <span class="slider"></span>
        </label>

    </div>

</div>

<nav class="bottom-nav">

    <a href="index.html" class="nav-item">

    </a>

</nav>

</script>

</body>
</html>
